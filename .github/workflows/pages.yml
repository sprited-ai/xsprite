# Demo site -> https://sprited-ai.github.io/sprute
name: pages

on:
  push:
    branches: [main]
    paths: ["demo/**", "examples/**", "src/**", "templates/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Build site
        run: |
          pnpm install --frozen-lockfile
          pnpm exec vite build demo
          mkdir -p demo/dist/assets
          cp examples/*.spritesheet.png examples/*.turntable.webp demo/dist/assets/
      - uses: actions/upload-pages-artifact@v4
        with:
          path: demo/dist
      - id: deployment
        uses: actions/deploy-pages@v4
